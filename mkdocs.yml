site_name: Tarea II - Física Computacional - C31960
site_description: Documentación del Método de Cuadratura Gaussiana por Polinomios de Legendre

theme:
  name: "material"

nav:
  - Inicio: index.md
  - Explicación: explanation.md
  - Tutoriales: tutorials.md
  - Referencias: references.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

