site_name: Tarea II
site_description: Documentación del Método de Cuadratura Gaussiana por Polinomios de Legendre

nav:
  - Inicio: index.md
  - Explicación: explanation.md
  - Tutoriales: tutorials.md
  - Referencias: reference.md

theme:
  name: "material"

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - mkdocstrings:
